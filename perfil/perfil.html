<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil de usuario - TecnoParts</title>
<link rel="stylesheet" href="perfil.css">
</head>
<body>

<div class="topbar">📍 Entregas locales exclusivas en Santa Marta</div>

<header class="navbar">
  <a href="../inicio/inicio.html" class="logo" aria-label="Inicio">
    <img src="../img/logo-Tecnoparts.png" alt="TecnoParts" style="max-height:56px;width:auto;display:block;">
  </a>
  <nav class="nav-links">
    <a href="../inicio/inicio.html">Inicio</a>
    <a href="../catalogo/catalogo.html">Catálogo</a>
    <a href="../admin/admin.html" class="nav-add-card" style="display:none">+ Agregar Tarjeta</a>
  </nav>
  <a href="../carrito/carrito.html" class="btn-cart">🛒</a>
</header>

<main class="profile-wrap">
  <div class="profile-card">
    <div class="tabs">
      <button class="tab active" data-tab="perfil">Mi perfil</button>
      <button class="tab" data-tab="seguridad">Seguridad</button>
    </div>

    <form id="profileForm" class="form" data-tab-content="perfil" enctype="multipart/form-data">
      <h1>Editar perfil</h1>
      <p class="muted">Cambia tu nombre, correo y imagen de perfil. El rol no se puede modificar.</p>

      <div class="avatar-section">
        <div class="avatar-preview" id="avatarPreview" aria-label="Previsualización de avatar"></div>
        <label class="file-label">Seleccionar foto de perfil
          <input type="file" name="avatar" id="avatarInput" accept="image/*">
        </label>
      </div>

      <label>Nombre de usuario</label>
      <input type="text" name="nombre" required>

      <label>Correo electrónico</label>
      <input type="email" name="email" required>

      <label>Rol</label>
      <input type="text" name="rol" readonly disabled>

      <button type="submit" class="btn-primary">Guardar cambios</button>
      <div class="msg" id="profileMsg"></div>
    </form>

    <form id="securityForm" class="form hidden" data-tab-content="seguridad">
      <h1>Cambiar contraseña</h1>
      <p class="muted">Puedes actualizar tu contraseña aquí.</p>

      <label>Nueva contraseña</label>
      <input type="password" name="password" placeholder="Mínimo 8 caracteres">

      <label>Confirmar contraseña</label>
      <input type="password" name="confirmPassword" placeholder="Repite la nueva contraseña">

      <button type="submit" class="btn-primary">Actualizar contraseña</button>
      <div class="msg" id="securityMsg"></div>
    </form>

    <div class="logout-section">
      <button type="button" id="logoutButton" class="btn-logout">Cerrar sesión</button>
    </div>
  </div>
</main>

<script src="../js/auth-ui.js"></script>
<script src="perfil.js"></script>
</body>
</html>
