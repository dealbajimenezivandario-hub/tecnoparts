<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Búsqueda - TecnoParts</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="busqueda.css">
</head>

<body>

<div class="topbar">
  📍 Entregas locales exclusivas en Santa Marta
</div>

<header class="navbar">

  <a href="../inicio/inicio.html" class="logo">
    📺 TecnoParts
  </a>

  <nav class="nav-links">
    <a href="../inicio/inicio.html">Inicio</a>
    <a href="../catalogo/catalogo.html">Catálogo</a>
    <a href="../admin/admin.html">+ Agregar Tarjeta</a>
  </nav>

  <form class="nav-search" id="navSearch">

    <input 
      type="text" 
      name="q" 
      placeholder="Buscar por modelo de TV..." 
      data-testid="search-input"
    >

    <button type="submit">🔍</button>

  </form>

  <div class="nav-actions">

    <a href="../login/login.html" class="btn-login" id="btnLogin">
      👤 Ingresar
    </a>

    <a href="../carrito/carrito.html" class="btn-cart">
      🛒 <span id="cartCount">0</span>
    </a>

  </div>

</header>

<main class="layout">

  <aside class="filters">

    <h3>▽ Filtros</h3>

    <div class="filter-group">

      <h4>Marcas</h4>

      <label>
        <input type="checkbox" name="marca" value="Samsung">
        Samsung
      </label>

      <label>
        <input type="checkbox" name="marca" value="LG">
        LG
      </label>

      <label>
        <input type="checkbox" name="marca" value="Sony">
        Sony
      </label>

    </div>

    <div class="filter-group">

      <h4>Tipo de Tarjeta</h4>

      <label>
        <input type="checkbox" name="tipo" value="Main Board">
        Main Board
      </label>

      <label>
        <input type="checkbox" name="tipo" value="Fuente de Poder">
        Fuente de Poder
      </label>

      <label>
        <input type="checkbox" name="tipo" value="T-Con">
        T-Con
      </label>

    </div>

  </aside>

  <section class="content">

    <form class="search-bar" id="searchBar">

      <span>🔍</span>

      <input 
        type="text" 
        name="q" 
        placeholder="Busca por modelo específico..." 
        data-testid="search-bar-input"
      >

    </form>

    <div class="results-count">
      Mostrando <strong id="totalCount">0</strong> resultados
    </div>

    <div class="grid" id="grid" data-testid="search-results">
      <div class="loading">Buscando...</div>
    </div>

  </section>

</main>

<script src="busqueda.js"></script>

</body>
</html>
